name: smart-learning-assistant

services:
  postgres:
    image: m.daocloud.io/docker.io/pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_learning}
      POSTGRES_USER: ${POSTGRES_USER:-smart_learning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_learning_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-smart_learning}:${POSTGRES_PASSWORD:-smart_learning_dev}@postgres:5432/${POSTGRES_DB:-smart_learning}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      AUTO_CREATE_TABLES: "true"
      SYNC_DOCUMENT_PROCESSING: ${SYNC_DOCUMENT_PROCESSING:-false}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /app/backend/storage/uploads
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/backend/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["celery", "-A", "backend.app.tasks.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-smart_learning}:${POSTGRES_PASSWORD:-smart_learning_dev}@postgres:5432/${POSTGRES_DB:-smart_learning}
      JWT_SECRET: ${JWT_SECRET:-development-only-change-me}
      AUTO_CREATE_TABLES: "true"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /app/backend/storage/uploads
    volumes:
      - uploads:/app/backend/storage/uploads
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_WS_URL: /api/v1/ws/async-tasks
        VITE_ENABLE_MOCK: "false"
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
